{% extends "layout.html" %}

{% block content %}
  <div class="card">
    <h2>Редактирование расхода</h2>
    <form action="{{ url_for('update_expense', expense_id=expense['id']) }}" method="post">
      <label for="amount">Сумма</label>
      <input id="amount" name="amount" type="number" step="0.01" min="0" required value="{{ "%.2f" | format(expense['amount']) }}" />

      <label for="category_id">Категория</label>
      <select id="category_id" name="category_id">
        {% for category in categories %}
          <option value="{{ category['id'] }}" {% if category['id'] == expense['category_id'] %}selected{% endif %}>{{ category['name'] }}</option>
        {% endfor %}
      </select>

      <label for="note">Комментарий</label>
      <textarea id="note" name="note" rows="2">{{ expense['note'] }}</textarea>

      <label for="date">Дата и время</label>
      <input id="date" name="date" type="datetime-local" value="{{ expense['date'] | datetime_local }}" />

      <button type="submit">Обновить</button>
      <a href="{{ url_for('index') }}" class="nav-link">Отмена</a>
    </form>
  </div>
{% endblock %}
