<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Трекер расходов</title>
    <style>
      :root { --bg: #eef2ff; --fg: #111827; --muted: #64748b; --primary: #4338ca; }
      body { font-family: Inter, Arial, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
      .title { margin: 0; font-size: 2rem; letter-spacing: -0.03em; }
      .topbar { display: flex; flex-wrap: nowrap; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .nav-link { padding: 10px 16px; border-radius: 999px; text-decoration: none; color: #4b5563; background: #f8fafc; border: 1px solid transparent; transition: all 0.2s ease; white-space: nowrap; }
      .nav-link:hover { background: #eef2ff; color: #1f2937; }
      .nav-link.active { background: var(--primary); color: #fff; border-color: var(--primary); }
      .card { background: #fff; border-radius: 18px; padding: 24px; margin-bottom: 20px; box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08); }
      h1, h2, h3 { margin-top: 0; }
      label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
      input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 16px; box-sizing: border-box; background: #f8fafc; color: var(--fg); }
      input:focus, select:focus, textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12); }
      button { background: var(--primary); border: none; color: white; padding: 12px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; }
      button:hover { background: #3730a3; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
      th { color: #475569; font-weight: 700; }
      .badge { display: inline-flex; align-items: center; justify-content: center; padding: 6px 12px; border-radius: 999px; background: #eef2ff; color: var(--primary); font-size: 0.9rem; }
      .alert { background: #fef3c7; border-left: 5px solid #f59e0b; padding: 16px 18px; margin-bottom: 16px; border-radius: 12px; color: #92400e; }
      .metric-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
      .metric { background: #eef2ff; border-radius: 16px; padding: 18px 20px; }
      .metric-title { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; }
      .metric-value { font-size: 1.6rem; font-weight: 700; color: var(--fg); }
      .status-ok { background: #ecfdf5; color: #166534; }
      .status-bad { background: #ffebee; color: #b91c1c; }
      .tag { display: inline-flex; gap: 8px; align-items: center; margin-bottom: 16px; color: #475569; }
      .tag span { font-weight: 600; }

      /* Mobile adjustments */
      @media (max-width: 720px) {
        .container { padding: 16px; }
        .title { font-size: 1.4rem; }
        .header { flex-direction: column; align-items: flex-start; gap: 12px; }
        .topbar { width: 100%; justify-content: flex-start; }
        .nav-link { padding: 8px 12px; font-size: 0.95rem; }
        .card { padding: 16px; border-radius: 12px; }
        .metric-value { font-size: 1.25rem; }
      }

      @media (max-width: 420px) {
        .metric-list { grid-template-columns: 1fr; }
        .nav-link { padding: 10px; border-radius: 10px; }
        input, select, textarea { padding: 10px 12px; }
        button { width: 100%; padding: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div>
          <h1 class="title">Трекер расходов</h1>
          <p class="tag"><span>Умный бюджет</span> — добавляй расходы, создавай категории и устанавливай лимиты.</p>
        </div>
        <nav class="topbar">
          <a href="{{ url_for('index') }}" class="nav-link {% if active_page == 'home' %}active{% endif %}">Главная</a>
          <a href="{{ url_for('daily_page') }}" class="nav-link {% if active_page == 'daily' %}active{% endif %}">Ежедневно</a>
          <a href="{{ url_for('categories_page') }}" class="nav-link {% if active_page == 'categories' %}active{% endif %}">Категории</a>
          <a href="{{ url_for('report_page') }}" class="nav-link {% if active_page == 'report' %}active{% endif %}">Отчёт</a>
        </nav>
      </div>

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
